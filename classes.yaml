classes:
  SEPARADORES:
    regras: [" ", "\n", "(", ")", "{", "}", ";", ","]
  
  OPERADORES:
    regras: ["=", "+", "-", "*", "/", "==", "&&"]
    delimitadores: ["IDENTIFICADOR", "NUMERAL", "SEPARADORES"]
  
  PALAVRAS_RESERVADAS:
    regras: ["for", "int", "float", "if", "while", "return"]
    delimitadores: ["SEPARADORES", "OPERADORES"]
  
  NUMERAL:
    regras: '^([0-9]+(\.[0-9]+)?|0x[0-9A-Fa-f]+)$'
    delimitadores: ["SEPARADORES", "OPERADORES"]
  
  IDENTIFICADOR:
    regras: '^[A-Za-z_][A-Za-z0-9_]*$'
    delimitadores: ["SEPARADORES", "OPERADORES"]
  
  LITERAL:
    regras: '^(\"[^\"]*\"|\'[^\']*\')$'
    delimitadores: ["SEPARADORES", "OPERADORES"]